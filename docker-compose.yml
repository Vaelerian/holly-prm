services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: holly_prm
      POSTGRES_USER: holly
      POSTGRES_PASSWORD: holly_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
